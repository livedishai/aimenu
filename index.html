<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>LiveDish AI Restaurant — AR Menu</title>
  <meta name="description" content="Interactive AR menu for LiveDish AI — authentic cuisine with 3D dish previews." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://unpkg.com" />
  <link rel="dns-prefetch" href="https://docs.google.com" />

  <link rel="preload"
        href="https://docs.google.com/spreadsheets/d/e/2PACX-1vTEkmIGoRgD1rQNmDgmY3lvB7WBOg86iOHHrS0MJ6qQiReuDHsUyX3YV7KoWXxTbefyBUWPTHpvUOt3/pub?output=csv"
        as="fetch" crossorigin="anonymous" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-sans:    'Inter', 'Helvetica Neue', sans-serif;
      --bg-dark:      #0d0d0d;
      --bg-card:      #141414;
      --text-white:   #ffffff;
      --text-gray:    #aaaaaa;
      --text-dim:     #666666;
      --accent-gold:  #eebb5d;
      --accent-hover: #dda446;
      --tag-new:      #10b981;
      --tag-bestseller: #ef4444;
      --border-color: #222222;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg-dark);
      color: var(--text-white);
      min-height: 100vh;
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER & HERO ── */
    .site-header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-left-icons {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .menu-toggle-btn {
      background: none;
      border: none;
      color: var(--text-white);
      cursor: pointer;
    }

    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .brand-logo {
      width: 28px;
      height: 28px;
      background: var(--accent-gold);
      border-radius: 6px;
    }
    .brand-name {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.5px;
    }
    .brand-name span {
      color: var(--accent-gold);
      font-size: 11px;
      display: block;
      margin-top: -4px;
      font-weight: 400;
      letter-spacing: 1px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }
    .action-icon-btn {
      background: none;
      border: none;
      color: var(--text-white);
      cursor: pointer;
      position: relative;
    }

    /* Hero Headline */
    .hero-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .hero-content h1 {
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 500;
      line-height: 1.2;
    }
    .hero-content h1 span {
      color: var(--accent-gold);
      display: block;
      font-weight: 600;
    }
    .hero-sub {
      color: var(--text-gray);
      font-size: 14px;
      margin-top: 0.75rem;
    }

    /* Search & Filter Controls */
    .search-filter-row {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 600px;
    }
    .search-box-wrap {
      position: relative;
      flex: 1;
    }
    .search-box-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
    }
    .search-input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px 14px 14px 44px;
      color: var(--text-white);
      font-family: var(--font-sans);
      font-size: 14px;
      outline: none;
    }
    .search-input::placeholder {
      color: var(--text-dim);
    }
    .filter-btn {
      background: var(--accent-gold);
      border: none;
      border-radius: 12px;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #000;
      transition: background 0.2s;
    }
    .filter-btn:hover {
      background: var(--accent-hover);
    }

    /* Language Picker Styling */
    #language-picker {
      margin-left: auto;
      padding-right: 1rem;
    }
    #lang-select {
      background: #1a1a1a;
      color: var(--text-gray);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    /* ── CATEGORY TABS ── */
    .tabs-wrap {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,13,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-color);
      padding: 0.5rem 1rem;
    }
    .tabs-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 8px 0;
    }
    .tabs-inner::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      padding: 8px 20px;
      border: 1px solid var(--border-color);
      background: #161616;
      color: var(--text-gray);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border-radius: 20px;
    }
    .tab-btn:hover {
      border-color: rgba(255,255,255,0.2);
      color: var(--text-white);
    }
    .tab-btn.active {
      background: var(--accent-gold);
      color: #000;
      border-color: var(--accent-gold);
    }

    /* ── MAIN CONTENT AREA ── */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 1rem 5rem;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 1.5rem;
      letter-spacing: -0.2px;
    }

    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* ── DISH CARD DESIGN ── */
    .menu-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .menu-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.5);
    }
    .menu-card.unavailable {
      opacity: 0.4;
      pointer-events: none;
    }

    /* Thumbnail Frame */
    .card-thumb-wrap {
      width: 100%;
      height: 200px;
      background: #1e1e1e;
      position: relative;
      overflow: hidden;
    }
    .card-thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .fallback-emoji {
      font-size: 54px;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Badges layered over Image */
    .ribbon-tag {
      position: absolute;
      top: 12px;
      left: 12px;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      text-transform: capitalize;
      color: #fff;
    }
    .ribbon-tag.bestseller { background: var(--tag-bestseller); }
    .ribbon-tag.new { background: var(--tag-new); }

    .favorite-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      border: none;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* Card Details Structure */
    .card-body {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 4px;
    }
    .dish-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-white);
    }
    
    /* Meta Row: Ratings and Veg Indicator */
    .meta-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .rating-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--accent-gold);
      font-weight: 500;
    }
    .rating-badge span {
      color: var(--text-dim);
    }
    
    /* Veg / Non-veg outline box indicator */
    .diet-indicator {
      width: 14px;
      height: 14px;
      border: 1.5px solid #10b981;
      padding: 1.5px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .diet-indicator::before {
      content: '';
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #10b981;
    }
    .diet-indicator.non-veg {
      border-color: #ef4444;
    }
    .diet-indicator.non-veg::before {
      background: #ef4444;
    }

    .dish-desc {
      font-size: 12px;
      color: var(--text-gray);
      line-height: 1.5;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Action Footer alignment */
    .card-footer {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .dish-price {
      font-size: 18px;
      font-weight: 700;
    }

    .ar-btn {
      width: 100%;
      background: var(--accent-gold);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 11px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.2s;
    }
    .ar-btn:hover {
      background: var(--accent-hover);
    }
    .ar-btn svg {
      width: 16px;
      height: 16px;
    }

    /* ── SKELETON PLACEHOLDERS ── */
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .skeleton-card {
      background: var(--bg-card);
      border-radius: 16px;
      height: 360px;
      border: 1px solid var(--border-color);
      animation: shimmer 1.5s infinite ease-in-out;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* ── MODAL AR VIEW WINDOW ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 9000; align-items: flex-end; justify-content: center;
      backdrop-filter: blur(8px);
    }
    @media (min-width: 540px) { .modal-overlay { align-items: center; padding: 1.5rem; } }
    .modal-overlay.open { display: flex; }
    
    .modal-card {
      background: var(--bg-card); border: 1px solid var(--border-color);
      width: 100%; max-width: 500px; max-height: 90svh;
      overflow-y: auto; position: relative; border-radius: 20px;
    }
    
    .modal-viewer-wrap {
      width: 100%; height: 320px; background: #000; position: relative;
    }
    model-viewer { width: 100%; height: 100%; }
    
    .modal-close {
      position: absolute; top: 16px; right: 16px; width: 36px; height: 36px;
      background: rgba(0,0,0,0.6); border: 1px solid var(--border-color);
      color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 10;
    }
    .modal-body { padding: 1.5rem; }
    .modal-name { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .modal-desc { font-size: 14px; color: var(--text-gray); line-height: 1.6; margin-bottom: 1.5rem; }
    
    .modal-footer {
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--border-color); padding-top: 1rem;
    }
    .modal-price { font-size: 24px; font-weight: 700; color: var(--accent-gold); }

    .modal-ar-launch-btn {
      background: var(--accent-gold); color: #000; border: none;
      padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer;
    }

    .site-footer {
      text-align: center; padding: 3rem 1rem; font-size: 12px; color: var(--text-dim);
      border-top: 1px solid var(--border-color);
    }

    /* Loader Viewers */
    .mv-loader {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px; background: #111; z-index: 5;
    }
    .mv-loader.hidden { display: none; }
    .mv-loader-ring { width: 32px; height: 32px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--accent-gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #mv-wrapper { position: absolute; inset: 0; z-index: 2; opacity: 0; }
    #mv-wrapper.mv-visible { opacity: 1; }
    .ar-not-supported { display: none; padding: 10px; text-align: center; font-size: 12px; color: var(--tag-bestseller); }
  </style>
</head>
<body>

<header class="site-header">
  <div class="nav-left-icons">
    <button class="menu-toggle-btn" aria-label="Menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>

<section class="hero-section">

<nav class="tabs-wrap" aria-label="Menu categories">

<main class="main">

<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-card">
    <div class="modal-viewer-wrap" id="modal-viewer-wrap">
      <button class="modal-close" id="modal-close">✕</button>

      <div class="ar-not-supported" id="ar-not-supported">AR viewing not supported on this device setup</div>

    <div class="modal-body">
      <h2 class="modal-name" id="modal-name"></h2>

        <div class="modal-price" id="modal-price"></div>
        <button class="modal-ar-launch-btn" id="modal-ar-launch-btn">✦ View On Table</button>
      </div>
    </div>
  </div>
</div>

<footer class="site-footer">
  Powered by LiveDish AI · Prices in ₹ · Real portion sizes reflected in 3D previews
</footer>

<script>

  ta: { sub:'உங்களுக்கு பிடித்த உணவுகளை உங்கள் மேஜையில் அமேசிங் 3D AR இல் பாருங்கள்.', all:'அனைத்தும்', starter:'தொடக்க', 'main-course':'முதன்மை', dessert:'இனிப்பு' },
  ml: { sub:'നിങ്ങളുടെ പ്രിയപ്പെട്ട വിഭവങ്ങൾ നിങ്ങളുടെ മേശപ്പുറത്ത് അതിശയകരമായ 3D AR-ൽ കാണുക.', all:'എല്ലാം', starter:'സ്റ്റാർട്ടർ', 'main-course':'മെയിൻ കോഴ്സ്', dessert:'ഡെസേർട്ട്' },
  te: { sub:'మీ ఇష్టమైన వంటకాలను మీ టేబుల్ పై అద్భుతమైన 3D AR లో చూడండి.', all:'అన్నీ', starter:'స్టార్టర్', 'main-course':'మెయిన్ కోర్స్', dessert:'డెజర్ట్' }
};

const CACHE_KEY = 'menu_csv_v1';
const CACHE_TTL = 15 * 60 * 1000;

function getCachedCSV() {
  try {
    const raw = sessionStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const { ts, text } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL) { sessionStorage.removeItem(CACHE_KEY); return null; }
    return text;
  } catch { return null; }
}
function setCachedCSV(text) {
  try { sessionStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), text })); } catch {}
}

const csvPromise = (async () => {
  const cached = getCachedCSV();
  if (cached) return cached;
  const res = await fetch(CSV_URL);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  setCachedCSV(text);
  return text;
})();

let mvModulePromise = null;
let mvModuleReady = false;

function ensureModelViewerLoaded() {
  if (!mvModulePromise) {
    mvModulePromise = import('https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js')
      .then(() => { mvModuleReady = true; });
  }
  return mvModulePromise;
}

function normalizeKey(str) { return (str||'').toLowerCase().replace(/\s+/g,'-').trim(); }

function getLocalAssets(dishName) {
  const key = normalizeKey(dishName);
  const entry = LOCAL_ASSETS[key];
  if (!entry) return { posterPath:'', glbPath:'', usdzPath:'', scale:0.05, orbit:'0deg 75deg 105%' };
  const base = `${ASSETS_BASE}/${entry.folder}/${entry.file}`;
  return {
    posterPath: `${base}.png`,
    glbPath:    `${base}.glb`,
    usdzPath:   `${base}.usdz`,
    scale:      entry.scale,
    orbit:      entry.orbit ?? '0deg 75deg 105%'
  };
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = splitLine(lines[0]).map(h => h.trim().toLowerCase());
  return lines.slice(1).map(line => {
    const vals = splitLine(line), obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i]||'').trim(); });
    return obj;
  });
}

function splitLine(line) {
  const result=[]; let cur='', inQ=false;
  for (let i=0; i<line.length; i++) {
    const ch=line[i];
    if(ch==='"'&&!inQ){inQ=true;continue;}
    if(ch==='"'&&inQ){if(line[i+1]==='"'){cur+='"';i++;}else{inQ=false;}continue;}
    if(ch===','&&!inQ){result.push(cur);cur='';continue;}
    cur+=ch;
  }
  result.push(cur); return result;
}

/* ─────────────────────────────────────────────
   RUNTIME APP STATE
───────────────────────────────────────────── */
let allDishes=[], rawRows=[], activeCategory='all', currentLang='en', searchQuery='';
const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent) || 
              (navigator.platform==='MacIntel' && navigator.maxTouchPoints > 1);

function rowToDish(row) {
  const truthy = v => ['true','yes','1'].includes((v||'').toLowerCase());
  const sfx = {it:'_it',kn:'_kn',ta:'_ta',ml:'_ml',te:'_te'}[currentLang]||'';
  const desc = row[`description${sfx}`] || row['description'] || '';
  const name = row[`name${sfx}`]        || row['name']        || '';
  const local = getLocalAssets(row['name']);
  return {
    id: row['id']||'', name,
    category: (row['category']||'other').toLowerCase(),
    desc, price: parseInt(row['price']||'0',10),
    veg: truthy(row['veg']), available: truthy(row['available']),
    glbPath: local.glbPath, usdzPath: local.usdzPath,
    posterPath: local.posterPath, scale: local.scale,
    orbit: local.orbit,
    emoji: EMOJI_MAP[normalizeKey(row['name'])]||'🍽️',
    rating: (Math.random() * (4.9 - 4.5) + 4.5).toFixed(1), 
    reviews: Math.floor(Math.random() * (140 - 40) + 40),
    isNew: truthy(row['new']) || Math.random() > 0.6, 
    isBestseller: Math.random() > 0.7 
  };
}

function catLabel(cat) {
  const langPack = I18N[currentLang] || I18N.en;
  return langPack[cat] || (cat.charAt(0).toUpperCase() + cat.slice(1));
}

function renderTabs() {
  const cats = ['all','starter','main-course','dessert'];
  const wrap = document.getElementById('tabs-inner');
  wrap.innerHTML = cats.map(c =>
    `<button class="tab-btn${c===activeCategory?' active':''}" data-cat="${c}">${catLabel(c)}</button>`
  ).join('');
  wrap.querySelectorAll('.tab-btn').forEach(btn =>
    btn.addEventListener('click', ()=>{ activeCategory=btn.dataset.cat; renderTabs(); renderItems(); })
  );
}

function cardHTML(d) {
  const thumb = d.posterPath
    ? `<img src="${d.posterPath}" alt="${d.name}" loading="lazy" decoding="async">`
    : `<div class="fallback-emoji">${d.emoji}</div>`;
  
  let structuralTag = '';
  if (d.isBestseller) structuralTag = `<span class="ribbon-tag bestseller">Bestseller</span>`;
  else if (d.isNew) structuralTag = `<span class="ribbon-tag new">New</span>`;

  return `
    <div class="menu-card${d.available?'':' unavailable'}" data-id="${d.id}" role="button" tabindex="0">
      <div class="card-thumb-wrap">
        ${thumb}
        ${structuralTag}
        <button class="favorite-btn" aria-label="Favorite">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
        </button>
      </div>
      <div class="card-body">
        <div class="title-row">
          <span class="dish-name">${d.name}</span>
        </div>
        <div class="meta-row">
          <div class="rating-badge">★ ${d.rating} <span>(${d.reviews})</span></div>
          <div class="diet-indicator ${d.veg ? 'veg' : 'non-veg'}"></div>
        </div>
        <p class="dish-desc">${d.desc}</p>
        <div class="card-footer">
          <div class="dish-price">₹${d.price.toLocaleString('en-IN')}</div>
          <button class="ar-btn" data-id="${d.id}">3D View in AR</button>
        </div>
      </div>
    </div>`;
}

function renderItems() {
  let filtered = activeCategory==='all' ? allDishes : allDishes.filter(d=>d.category===activeCategory);
  
  if (searchQuery) {
    filtered = filtered.filter(d => d.name.toLowerCase().includes(searchQuery.toLowerCase()) || d.desc.toLowerCase().includes(searchQuery.toLowerCase()));
  }

  const container = document.getElementById('items-container');
  if(!filtered.length) {
    container.innerHTML = `<div style="text-align:center; padding: 3rem 1rem; color: var(--text-dim)">No items matches your view criteria</div>`;
    return;
  }

  container.innerHTML = `<div class="items-grid">${filtered.map(d => cardHTML(d)).join('')}</div>`;

  requestAnimationFrame(() => {
    container.querySelectorAll('.menu-card').forEach(card => {
      card.addEventListener('click', () => openModal(card.dataset.id));
    });
    container.querySelectorAll('.ar-btn').forEach(btn =>
      btn.addEventListener('click', e => { e.stopPropagation(); openModal(btn.dataset.id); })
    );
  });
}

/* ─────────────────────────────────────────────
   MODEL INTERACTION & AR IMPLEMENTATIONS
───────────────────────────────────────────── */
const elMvWrapper     = document.getElementById('mv-wrapper');
const elMvLoader      = document.getElementById('mv-loader');
const elPhoto         = document.getElementById('modal-photo');
const elArBtnWrap     = document.getElementById('modal-ar-launch-btn');
const elArNotSupported= document.getElementById('ar-not-supported');

let currentDish = null;
let elMV = null; 

function openModal(id) {
  const d = allDishes.find(x=>x.id===id);
  if (!d) return;
  currentDish = d;

  document.getElementById('modal-name').textContent = d.name;
  document.getElementById('modal-desc').textContent = d.desc;
  document.getElementById('modal-price').innerHTML  = `₹${d.price.toLocaleString('en-IN')}`;

  elMvWrapper.classList.remove('mv-visible');
  elMvLoader.classList.remove('hidden');
  elArNotSupported.style.display = 'none';
  elPhoto.innerHTML = d.posterPath ? `<img src="${d.posterPath}" style="width:100%;height:100%;object-fit:cover;">` : `<div>${d.emoji}</div>`;
  elMvWrapper.innerHTML = '';

  if (d.glbPath) {
    ensureModelViewerLoaded().then(() => {
      if (currentDish?.id !== d.id) return; 

      elMV = document.createElement('model-viewer');
      elMV.setAttribute('ar', '');
      elMV.setAttribute('ar-modes', 'webxr scene-viewer quick-look');
      elMV.setAttribute('camera-controls', '');
      elMV.setAttribute('shadow-intensity', '1');
      elMV.setAttribute('environment-image', 'neutral');
      elMV.setAttribute('scale', `${d.scale} ${d.scale} ${d.scale}`);
      elMV.setAttribute('camera-orbit', d.orbit ?? '0deg 75deg 105%');

      if (isIOS && d.usdzPath) { elMV.setAttribute('ios-src', d.usdzPath); }

      elMV.addEventListener('load', () => {
        if (currentDish?.id === d.id) {
          elMvLoader.classList.add('hidden');
          elMvWrapper.classList.add('mv-visible');
        }
      });

      elMvWrapper.appendChild(elMV);
      elMV.setAttribute('src', d.glbPath);
    });
  } else {
    elMvLoader.classList.add('hidden');
  }

  document.getElementById('modal-overlay').classList.add('open');
}

elArBtnWrap.addEventListener('click', () => {
  if (elMV && elMV.canActivateAR) {
    elMV.activateAR();
  } else {
    elArNotSupported.style.display = 'block';
  }
});

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  elMvWrapper.innerHTML = '';
  elMV = null;
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('dish-search').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderItems();
});

document.getElementById('lang-select').addEventListener('change', e => {
  currentLang = e.target.value;
  document.getElementById('ui-sub-tag').textContent = I18N[currentLang].sub;
  allDishes = rawRows.map(rowToDish).filter(d=>d.name);
  renderTabs(); renderItems();
});

async function init() {
  try {
    const text = await csvPromise;
    rawRows    = parseCSV(text);
    allDishes  = rawRows.map(rowToDish).filter(d=>d.name);
    renderTabs();
    renderItems();
  } catch(err) {
    document.getElementById('items-container').innerHTML = `<div style="text-align:center;padding:4rem 1rem;">Failed to load restaurant database menu pipeline setup</div>`;
  }
}

init();
</script>
