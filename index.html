<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Dish-AI | The Pinnacle of Gastronomic Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #C5A059;
            --dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --transition: cubic-bezier(0.23, 1, 0.32, 1);
        }

        body {
            background: var(--dark);
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Premium Navbar */
        header {
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            z-index: 100;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(20px);
        }

        .logo { height: 40px; }

        /* Hero with Parallax Feel */
        .hero {
            height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1544148103-0773bf10d330?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
        }

        h1 { font-family: 'Cinzel', serif; font-size: 5rem; letter-spacing: 0.2rem; }

        /* Advanced Card Animation */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            padding: 5rem;
        }

        .card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 3rem;
            transition: 0.6s var(--transition);
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .card:hover {
            transform: translateY(-20px) rotateX(10deg);
            border-color: var(--gold);
        }

        /* Dashboard Simulation */
        .dashboard-preview {
            background: #111;
            padding: 2rem;
            border-radius: 10px;
            margin-top: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            font-size: 0.8rem;
        }

        .stat { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <img src="livedishai logo.png" class="logo" alt="Live Dish-AI Logo">
        <nav>
            <a href="#" style="color:white; text-decoration:none; letter-spacing:2px;">EXPERIENCE</a>
        </nav>
    </header>

    <section class="hero">
        <div>
            <h1>LIVE DISH-AI</h1>
            <p>REDESIGNING THE LUXURY DINING NARRATIVE</p>
        </div>
    </section>

    <div class="services-grid">
        <!-- Service 1 -->
        <div class="card">
            <i class="fas fa-utensils" style="font-size: 2rem; color: var(--gold);"></i>
            <h2>AR DISH ON TABLE</h2>
            <p>Hyper-realistic holographic projection of fine cuisine.</p>
        </div>

        <!-- Service 2 -->
        <div class="card">
            <i class="fas fa-crown" style="font-size: 2rem; color: var(--gold);"></i>
            <h2>MARKETING AR CARDS</h2>
            <p>Turn every invitation into a luxury brand activation.</p>
        </div>

        <!-- Service 3 (Advanced Dashboard) -->
        <div class="card">
            <i class="fas fa-chart-pie" style="font-size: 2rem; color: var(--gold);"></i>
            <h2>ENTERPRISE DASHBOARD</h2>
            <div class="dashboard-preview">
                <div>Occupancy: <span class="stat">92%</span></div>
                <div>Avg Bill: <span class="stat">₹12,400</span></div>
                <div>Peak Dish: <span class="stat">Truffle Risotto</span></div>
            </div>
        </div>
    </div>

    <script>
        // Reveal Animation on Scroll
        const cards = document.querySelectorAll('.card');
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if(entry.isIntersecting) entry.target.style.opacity = 1;
            });
        });
        cards.forEach(card => {
            card.style.opacity = 0;
            card.style.transition = "opacity 1s ease-in-out";
            observer.observe(card);
        });
    </script>
</body>
</html>
